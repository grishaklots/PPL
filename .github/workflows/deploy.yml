name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ppl-procedure-trainer
    steps:
      - uses: actions/checkout@v4
      # Enable GitHub Pages and set its source to "GitHub Actions" automatically,
      # so deploy-pages doesn't 404 with "Failed to create deployment".
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ppl-procedure-trainer/package-lock.json
      - run: npm ci
      - name: Build
        run: npm run build
        env:
          # Serve from https://<user>.github.io/<repo>/
          BASE_PATH: /${{ github.event.repository.name }}/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ppl-procedure-trainer/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
